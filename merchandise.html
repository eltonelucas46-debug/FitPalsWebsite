<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitPals Pro Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0b0b0b; color: #fff; line-height: 1.6; }

        header { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 20px 8%; background: rgba(17, 17, 17, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #222; z-index: 1000; }
        .logo { font-size: 24px; font-weight: 700; color: #2196f3; }
        .cart-btn { background: #2196f3; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; color: #fff; font-weight: 600; transition: 0.3s; }
        .cart-btn:hover { background: #1976d2; }

        .hero { margin-top: 100px; text-align: center; padding: 60px 20px; }
        .hero h1 { font-size: 48px; margin-bottom: 10px; }
        .hero span { color: #2196f3; }

        .products { padding: 40px 8%; max-width: 1200px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .card { background: #161616; padding: 20px; border-radius: 16px; border: 1px solid #222; text-align: center; transition: transform 0.3s; }
        .card:hover { transform: translateY(-10px); border-color: #2196f3; }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; margin-bottom: 15px; }
        .price { color: #2196f3; font-size: 1.2rem; font-weight: 700; margin: 10px 0; }
        button.add { background: #2196f3; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: 600; color: #fff; transition: 0.3s; }
        button.add:hover { background: #fff; color: #000; }

        .cart { position: fixed; right: -400px; top: 0; width: 350px; height: 100%; background: #111; padding: 30px; transition: 0.4s; overflow-y: auto; z-index: 2000; box-shadow: -5px 0 15px rgba(0,0,0,0.5); }
        .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-btn { cursor: pointer; font-size: 24px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; padding-bottom: 10px; border-bottom: 1px solid #222; }
        .remove-btn { color: #ff5252; cursor: pointer; margin-left: 10px; font-weight: bold; }
        .checkout { margin-top: 20px; width: 100%; padding: 15px; background: #25D366; border: none; border-radius: 8px; color: #fff; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="logo">FitPals<span> Store</span></div>
    <button class="cart-btn" onclick="toggleCart()">Cart (<span id="count">0</span>)</button>
</header>

<section class="hero">
    <h1>Elevate Your <span>Performance</span></h1>
</section>

<section class="products">
    <div class="grid" id="grid"></div>
</section>

<div class="cart" id="cart">
    <div class="cart-header">
        <h2>Your Cart</h2>
        <span class="close-btn" onclick="toggleCart()">&times;</span>
    </div>
    <div id="cartItems"></div>
    <div class="total" style="margin-top:20px; font-size: 1.2rem;">Total: KES <span id="total">0</span></div>
    <button class="checkout" onclick="checkout()">Checkout via WhatsApp</button>
</div>

<script>
    const products = [
        {id: 1, name: "Water Bottle", price: 800, img: "https://picsum.photos/300/200?random=1"},
        {id: 2, name: "Yoga Mat", price: 1500, img: "https://picsum.photos/300/200?random=2"},
        {id: 3, name: "Gym Gloves", price: 900, img: "https://picsum.photos/300/200?random=3"},
        {id: 4, name: "Resistance Bands", price: 700, img: "https://picsum.photos/300/200?random=4"},
        {id: 5, name: "Skipping Rope", price: 600, img: "https://picsum.photos/300/200?random=5"},
        {id: 6, name: "Premium Hoodie", price: 1800, img: "https://picsum.photos/300/200?random=6"}
    ];

    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    function render() {
        const grid = document.getElementById("grid");
        grid.innerHTML = products.map((p, i) => `
            <div class="card">
                <img src="${p.img}" alt="${p.name}">
                <h3>${p.name}</h3>
                <div class="price">KES ${p.price}</div>
                <button class="add" onclick="add(${i})">Add to Cart</button>
            </div>
        `).join('');
        updateCart();
    }

    function add(i) {
        const item = products[i];
        const found = cart.find(p => p.name === item.name);
        found ? found.qty++ : cart.push({...item, qty: 1});
        saveAndRender();
    }

    function remove(name) {
        cart = cart.filter(item => item.name !== name);
        saveAndRender();
    }

    function saveAndRender() {
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCart();
    }

    function updateCart() {
        const box = document.getElementById("cartItems");
        box.innerHTML = cart.map(item => `
            <div class="cart-item">
                <span>${item.name} x${item.qty}</span>
                <span>KES ${item.price * item.qty} <span class="remove-btn" onclick="remove('${item.name}')">✕</span></span>
            </div>
        `).join('');

        const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
        const count = cart.reduce((sum, item) => sum + item.qty, 0);
        document.getElementById("total").innerText = total;
        document.getElementById("count").innerText = count;
    }

    function toggleCart() {
        const cartEl = document.getElementById("cart");
        cartEl.style.right = cartEl.style.right === "0px" ? "-400px" : "0px";
    }

    function checkout() {
        if(cart.length === 0) return alert("Your cart is empty!");
        let msg = "Order Request:%0A" + cart.map(i => `${i.name} (x${i.qty}) - KES ${i.price * i.qty}`).join('%0A');
        const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
        msg += `%0A%0ATotal: KES ${total}`;
        window.open(`https://wa.me/254701350931?text=${msg}`, "_blank");
    }

    render();

if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("/FitPalsWebsite/service-worker.js")
.then(() => console.log("Service Worker Registered"));
}
</script>

</body>
</html>
